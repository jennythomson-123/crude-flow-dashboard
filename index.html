<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crude flow dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; font-size: 14px; }
.topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.topbar h1 { font-size: 15px; font-weight: 500; flex: 1; min-width: 180px; }
.upload-btn { position: relative; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 7px 13px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.22); background: #fff; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.upload-btn:hover { background: #f5f5f0; }
.upload-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
.status { font-size: 11px; color: #aaa; }
.status.ok  { color: #1D9E75; font-weight: 500; }
.status.err { color: #E24B4A; font-weight: 500; }
.controls-bar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.10); padding: 10px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-group label { font-size: 11px; color: #888; white-space: nowrap; }
select { font-size: 12px; padding: 5px 9px; border-radius: 7px; border: 0.5px solid rgba(0,0,0,0.22); background: #fff; color: #1a1a1a; font-family: inherit; cursor: pointer; }
.view-toggle { display: flex; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; overflow: hidden; }
.vtab { font-size: 11px; padding: 5px 14px; background: #fff; border: none; color: #888; cursor: pointer; font-family: inherit; white-space: nowrap; }
.vtab.active { background: #1a1a1a; color: #fff; font-weight: 500; }
.divider { width: 0.5px; background: rgba(0,0,0,0.1); height: 28px; }
.tabs-bar { display: flex; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 0 24px; overflow-x: auto; }
.tab { padding: 10px 18px; font-size: 12px; cursor: pointer; border: none; border-bottom: 2px solid transparent; color: #888; background: none; font-family: inherit; white-space: nowrap; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.tab:hover:not(.active) { color: #444; }
.panel { display: none; padding: 20px 24px; }
.panel.active { display: block; }
.stat-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.stat-card { background: #fff; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 110px; border: 0.5px solid rgba(0,0,0,0.08); }
.stat-card .lbl { font-size: 11px; color: #888; margin-bottom: 2px; }
.stat-card .val { font-size: 18px; font-weight: 500; }
.panel-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.panel-controls .lbl { font-size: 12px; color: #666; }
.gran-toggle { display: flex; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; overflow: hidden; width: fit-content; }
.gtab { font-size: 11px; padding: 5px 12px; background: #fff; border: none; color: #888; cursor: pointer; font-family: inherit; }
.gtab.active { background: #1a1a1a; color: #fff; font-weight: 500; }
.rtabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.rtab { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid rgba(0,0,0,0.18); background: #fff; color: #666; cursor: pointer; font-family: inherit; transition: all 0.12s; }
.chart-wrap { position: relative; width: 100%; }
.legend-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.legend-row span { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
.sw { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
.note { font-size: 11px; color: #bbb; margin-top: 8px; border-top: 0.5px solid rgba(0,0,0,0.07); padding-top: 8px; }
.col-info { font-size: 11px; color: #666; background: #fff; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 7px; padding: 8px 14px; margin-bottom: 12px; display: none; }
.col-info strong { color: #1a1a1a; }
.col-pill { display: inline-block; background: #f0efe8; border-radius: 20px; padding: 1px 8px; font-size: 10px; color: #555; margin: 0 2px; }
#b-tooltip, #s-tooltip { display:none; position:absolute; background:#fff; border:0.5px solid rgba(0,0,0,0.15); border-radius:8px; padding:9px 13px; font-size:12px; pointer-events:none; z-index:10; max-width:240px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
</style>
</head>
<body>

<div class="topbar">
  <h1>Crude flow dashboard <span style="font-size:11px;color:#aaa;font-weight:400;" id="period-lbl"></span></h1>
  <label class="upload-btn">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 5l4-4 4 4M2 12v2h12v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Upload Excel
    <input type="file" accept=".xlsx,.xls,.csv" id="file-input">
  </label>
  <span class="status" id="status-msg">Loading data…</span>
</div>

<div class="controls-bar">
  <div class="ctrl-group">
    <label>Current month:</label>
    <select id="sel-month"></select>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <label>Prior month (auto):</label>
    <span id="prior-month-lbl" style="font-size:12px;font-weight:500;color:#1a1a1a;">—</span>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <label>View:</label>
    <div class="view-toggle">
      <button class="vtab active" id="vt-mom" onclick="setView('mom')">m-o-m</button>
      <button class="vtab" id="vt-avg" onclick="setView('avg')">vs Annual avg</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <label>Export group:</label>
    <select id="sel-ex-gran">
      <option value="EX_COUNTRY">EX Country</option>
      <option value="EX_REGION" selected>EX Region</option>
      <option value="EX_Def_Region">EX Def Region</option>
      <option value="EX_T_REGION">EX Trade Region</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Import group:</label>
    <select id="sel-im-gran">
      <option value="IM_COUNTRY">IM Country</option>
      <option value="IM_REGION" selected>IM Region</option>
      <option value="IM_T_REGION">IM Trade Region</option>
      <option value="IM_Def_Region">IM Def Region</option>
    </select>
  </div>
</div>

<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('bubble',this)">Bubble scatter</button>
  <button class="tab" onclick="switchTab('diverging',this)">Diverging bars</button>
  <button class="tab" onclick="switchTab('waterfall',this)">Waterfall</button>
  <button class="tab" onclick="switchTab('sankey',this)">Sankey — flow map</button>
</div>

<!-- BUBBLE -->
<div class="panel active" id="panel-bubble">
  <div class="col-info" id="b-col-info"></div>
  <div class="stat-row" id="b-stats"></div>
  <div class="panel-controls">
    <span class="lbl">Filter export:</span>
    <select id="b-ex-filter"><option value="all">All</option></select>
    <span class="lbl">Filter import:</span>
    <select id="b-im-filter"><option value="all">All</option></select>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;" id="b-legend"></div>
  <div class="chart-wrap" style="height:520px;">
    <canvas id="bubbleChart" role="img" aria-label="Bubble scatter of crude flow corridors."></canvas>
  </div>
  <div id="b-tooltip"></div>
  <p class="note" id="b-note"></p>
</div>

<!-- DIVERGING -->
<div class="panel" id="panel-diverging">
  <div class="col-info" id="d-col-info"></div>
  <div class="rtabs" id="d-ex-tabs"></div>
  <div class="stat-row" id="d-stats"></div>
  <div class="chart-wrap" id="d-chart-wrap" style="height:400px;">
    <canvas id="divChart" role="img" aria-label="Diverging bar chart."></canvas>
  </div>
  <div class="legend-row" id="d-legend-row"></div>
  <p class="note" id="d-note"></p>
</div>

<!-- WATERFALL -->
<div class="panel" id="panel-waterfall">
  <div class="col-info" id="w-col-info"></div>
  <div class="panel-controls" style="align-items:flex-start;flex-direction:column;gap:6px;">
    <span class="lbl">Select import group:</span>
    <div class="rtabs" id="w-im-tabs" style="margin-bottom:0;"></div>
  </div>
  <div class="stat-row" id="w-stats"></div>
  <div class="chart-wrap" id="w-chart-wrap" style="height:420px;">
    <canvas id="wfChart" role="img" aria-label="Waterfall chart."></canvas>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:#666;">
    <span><span class="sw" style="background:#222;display:inline-block;"></span> Base (<span id="w-base-label">prior month</span>)</span>
    <span>Steps coloured by export group</span>
    <span><span class="sw" style="background:#222;display:inline-block;"></span> <span id="w-final-label">Current month</span></span>
  </div>
  <div class="legend-row" id="w-legend-row" style="margin-top:8px;"></div>
  <p class="note" id="w-note"></p>
</div>

<!-- SANKEY -->
<div class="panel" id="panel-sankey">
  <div class="col-info" id="s-col-info"></div>
  <div class="panel-controls" style="gap:16px;flex-wrap:wrap;margin-bottom:14px;">
    <div class="ctrl-group">
      <span class="lbl" style="font-size:12px;color:#666;">Export side:</span>
      <div class="gran-toggle">
        <button class="gtab active" id="s-ex-region"  onclick="setSankeyEx('EX_REGION')">IEA Region</button>
        <button class="gtab"        id="s-ex-tregion" onclick="setSankeyEx('EX_T_REGION')">Trade Region</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="lbl" style="font-size:12px;color:#666;">Import side:</span>
      <div class="gran-toggle">
        <button class="gtab active" id="s-im-region"  onclick="setSankeyIm('IM_REGION')">IEA Region</button>
        <button class="gtab"        id="s-im-tregion" onclick="setSankeyIm('IM_T_REGION')">Trade Region</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="lbl" style="font-size:12px;color:#666;">Min flow (kb/d):</span>
      <input type="range" id="s-threshold" min="0" max="5000" step="100" value="1500" style="width:120px;">
      <span id="s-threshold-lbl" style="font-size:12px;font-weight:500;color:#1a1a1a;min-width:60px;">1,500</span>
    </div>
  </div>
  <div class="stat-row" id="s-stats"></div>
  <div style="position:relative;">
    <div id="s-tooltip"></div>
    <div id="sankey-wrap" style="width:100%;overflow-x:auto;"></div>
  </div>
  <p class="note" id="s-note"></p>
</div>

<script>
/* ── COLORS ── */
const REGION_COLORS={
  "Africa":"#02889E","Eurasia":"#644875","Middle East":"#FFBD02",
  "NON-OECD Americas":"#01A93E","OECD Americas":"#81CFE1",
  "OECD Asia Oceania":"#EA7B1A","OECD Europe":"#D14648",
  "Other Asia":"#B59FCA","Unknown Origin":"#7F7F7F","Unknown":"#BFBFBF",
  "NAM":"#81CFE1","ME":"#FFBD02","Latam":"#01A93E","Russia":"#644875"
};
const PALETTE=["#02889E","#644875","#FFBD02","#01A93E","#81CFE1","#EA7B1A","#D14648","#B59FCA","#7F7F7F","#BFBFBF","#02889E","#644875"];
const _xc={};
function rColor(r){if(REGION_COLORS[r])return REGION_COLORS[r];if(!_xc[r])_xc[r]=PALETTE[Object.keys(_xc).length%PALETTE.length];return _xc[r];}
const fmtKbd=v=>(v>0?'+':'')+Math.round(v).toLocaleString()+' kb/d';
const fmtN=v=>Math.round(v).toLocaleString()+' kb/d';

/* ── STATE ── */
const S={
  rows:[],dates:[],curDate:null,priorDate:null,
  view:'mom',exGran:'EX_REGION',imGran:'IM_REGION',
  activeExKey:null,activeImKey:null
};
const SK={exField:'EX_REGION',imField:'IM_REGION',threshold:1500};
let bChart=null,dChart=null,wChart=null;
let COL={};

/* ── DATE UTILS ── */
function parseDate(raw){
  if(!raw&&raw!==0)return null;
  if(typeof raw==='number'&&raw>40000){
    try{const d=XLSX.SSF.parse_date_code(raw);return new Date(d.y,d.m-1,1);}catch(e){}
  }
  const s=String(raw).trim();
  let m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,1);
  m=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,1);
  m=s.match(/^([A-Za-z]{3})[-\s](\d{2,4})$/);
  if(m){const mo={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11}[m[1].toLowerCase()];if(mo!==undefined){let y=parseInt(m[2]);if(y<100)y+=2000;return new Date(y,mo,1);}}
  const d=new Date(s);return isNaN(d)?null:new Date(d.getFullYear(),d.getMonth(),1);
}
function dateKey(d){return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`:''; }
function dateLabel(d){if(!d)return '';return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear();}
function priorMonth(d){if(!d)return null;return new Date(d.getFullYear(),d.getMonth()-1,1);}

/* ── PARSE ── */
function processRawData(buf,filename){
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let hi=-1;
  for(let i=0;i<Math.min(15,raw.length);i++){if(raw[i].some(c=>String(c||'').trim().toUpperCase()==='EX_COUNTRY')){hi=i;break;}}
  if(hi<0){setStatus('Header row not found.','err');return;}
  const headers=raw[hi].map(c=>String(c||'').trim());
  COL={};
  const norm=s=>s.toLowerCase().replace(/[\s\-_]+/g,'');
  headers.forEach((h,i)=>{COL[norm(h)]=i;});
  function ci(name){const k=norm(name);if(COL[k]!==undefined)return COL[k];const f=Object.keys(COL).find(k2=>k2.includes(k)||k.includes(k2));return f!==undefined?COL[f]:-1;}
  const iExC=ci('EX_COUNTRY'),iExR=ci('EX_REGION'),iExD=ci('EX_Def_Region'),iExT=ci('EX_T_REGION');
  const iImC=ci('IM_COUNTRY'),iImR=ci('IM_REGION'),iImT=ci('IM_T_REGION'),iImD=ci('IM_Def_Region');
  const iDate=ci('DATE'),iPY=ci('PREV_YR'),iVal=ci('VALUE_KBD'),iPYA=ci('PREV_YR_AVG'),iMom=ci('Change m-o-m'),iVsA=ci('Change vs Annual Average');
  const miss=[];if(iExC<0)miss.push('EX_COUNTRY');if(iDate<0)miss.push('DATE');if(iVal<0)miss.push('VALUE_KBD');
  if(miss.length){setStatus('Missing: '+miss.join(', '),'err');return;}
  const parsed=[];
  for(let i=hi+1;i<raw.length;i++){
    const r=raw[i];
    const exC=String(r[iExC]||'').trim();if(!exC||exC.toUpperCase()==='EX_COUNTRY')continue;
    const dt=parseDate(r[iDate]);if(!dt)continue;
    parsed.push({
      EX_COUNTRY:exC,EX_REGION:String(r[iExR]||'').trim()||exC,
      EX_Def_Region:String(r[iExD]||'').trim()||exC,EX_T_REGION:String(r[iExT]||'').trim()||exC,
      IM_COUNTRY:String(r[iImC]||'').trim(),IM_REGION:String(r[iImR]||'').trim(),
      IM_T_REGION:String(r[iImT]||'').trim(),IM_Def_Region:String(r[iImD]||'').trim(),
      date:dt,dateKey:dateKey(dt),prevYr:parseInt(r[iPY])||0,
      value:parseFloat(r[iVal])||0,prevYrAvg:parseFloat(r[iPYA])||0,
      mom:parseFloat(r[iMom])||0,vsAvg:parseFloat(r[iVsA])||0
    });
  }
  if(!parsed.length){setStatus('No rows found.','err');return;}
  const dm={};parsed.forEach(d=>{if(!dm[d.dateKey])dm[d.dateKey]=d.date;});
  const sd=Object.values(dm).sort((a,b)=>a-b);
  S.rows=parsed;S.dates=sd;
  S.curDate=sd[sd.length-1];S.priorDate=priorMonth(S.curDate);
  const info=`<strong>Loaded:</strong> ${filename} — <span class="col-pill">${parsed.length} rows</span> <span class="col-pill">${sd.length} months</span> <span class="col-pill">${dateLabel(sd[0])} → ${dateLabel(sd[sd.length-1])}</span>`;
  ['b-col-info','d-col-info','w-col-info','s-col-info'].forEach(id=>{document.getElementById(id).innerHTML=info;document.getElementById(id).style.display='block';});
  setStatus(`Loaded: ${filename} — ${parsed.length} rows`,'ok');
  buildMonthPicker();buildFilterDropdowns();buildExTabs();buildWfTabs();buildLegends();
  renderAll();
}

document.getElementById('file-input').addEventListener('change',function(e){
  const file=e.target.files&&e.target.files[0];if(!file)return;
  setStatus('Reading…','');
  const reader=new FileReader();
  reader.onload=ev=>{try{processRawData(ev.target.result,file.name);}catch(err){setStatus('Error: '+err.message,'err');console.error(err);}};
  reader.readAsArrayBuffer(file);
});

function setStatus(msg,type){const el=document.getElementById('status-msg');el.textContent=msg;el.className='status'+(type?' '+type:'');}
function destroyAll(){if(bChart){bChart.destroy();bChart=null;}if(dChart){dChart.destroy();dChart=null;}if(wChart){wChart.destroy();wChart=null;}}

/* ── AGGREGATION ── */
function getRowsForDate(dk){return S.rows.filter(r=>r.dateKey===dk);}
function aggRows(rows,exF,imF){
  const map={};
  rows.forEach(r=>{
    const ex=r[exF]||'Unknown',im=r[imF]||'Unknown',k=ex+'|||'+im;
    if(!map[k])map[k]={ex,im,value:0,mom:0,vsAvg:0,pyas:0,pyac:0};
    map[k].value+=r.value;map[k].mom+=r.mom;map[k].vsAvg+=r.vsAvg;map[k].pyas+=r.prevYrAvg;map[k].pyac++;
  });
  return Object.values(map).map(d=>({...d,prevYrAvg:d.pyac>0?d.pyas/d.pyac:0}));
}
function aggByIm(rows,imF){
  const map={};
  rows.forEach(r=>{
    const im=r[imF]||'Unknown';
    if(!map[im])map[im]={im,value:0,mom:0,vsAvg:0,pyas:0,cnt:0};
    map[im].value+=r.value;map[im].mom+=r.mom;map[im].vsAvg+=r.vsAvg;map[im].pyas+=r.prevYrAvg;map[im].cnt++;
  });
  return Object.values(map).map(d=>({...d,prevYrAvg:d.cnt>0?d.pyas/d.cnt:0}));
}

/* ── MONTH PICKER ── */
function buildMonthPicker(){
  const sel=document.getElementById('sel-month');sel.innerHTML='';
  S.dates.slice().reverse().forEach(d=>{const o=document.createElement('option');o.value=dateKey(d);o.textContent=dateLabel(d);if(dateKey(d)===dateKey(S.curDate))o.selected=true;sel.appendChild(o);});
  updatePriorLabel();
  sel.onchange=()=>{S.curDate=S.dates.find(d=>dateKey(d)===sel.value)||S.curDate;S.priorDate=priorMonth(S.curDate);updatePriorLabel();destroyAll();renderAll();};
}
function updatePriorLabel(){
  document.getElementById('period-lbl').textContent=S.curDate?`— ${dateLabel(S.priorDate)||'n/a'} vs ${dateLabel(S.curDate)}`:'';
  const lbl=document.getElementById('prior-month-lbl');if(lbl)lbl.textContent=dateLabel(S.priorDate)||'n/a';
  const wb=document.getElementById('w-base-label'),wf=document.getElementById('w-final-label');
  if(wb)wb.textContent=S.view==='mom'?(dateLabel(S.priorDate)||'prior month'):'Annual avg';
  if(wf)wf.textContent=dateLabel(S.curDate)||'current month';
}

/* ── VIEW ── */
function setView(v){
  S.view=v;
  document.getElementById('vt-mom').classList.toggle('active',v==='mom');
  document.getElementById('vt-avg').classList.toggle('active',v==='avg');
  updatePriorLabel();destroyAll();renderAll();
}

/* ── GRAN SELECTORS ── */
document.getElementById('sel-ex-gran').onchange=function(){S.exGran=this.value;buildExTabs();buildWfTabs();buildFilterDropdowns();buildLegends();destroyAll();renderAll();};
document.getElementById('sel-im-gran').onchange=function(){S.imGran=this.value;buildWfTabs();buildFilterDropdowns();buildLegends();destroyAll();renderAll();};

/* ── FILTER DROPDOWNS ── */
function buildFilterDropdowns(){
  const exV=[...new Set(S.rows.map(r=>r[S.exGran]))].filter(Boolean).sort();
  const imV=[...new Set(S.rows.map(r=>r[S.imGran]))].filter(Boolean).sort();
  ['b-ex-filter','b-im-filter'].forEach((id,idx)=>{
    const sel=document.getElementById(id),prev=sel.value;
    sel.innerHTML=`<option value="all">All ${idx?'import':'export'}</option>`;
    (idx?imV:exV).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
    if(prev&&prev!=='all')sel.value=prev;
    sel.onchange=()=>{destroyAll();renderAll();};
  });

/* ── WATERFALL ── */
function renderWaterfall(){
  const cdk=dateKey(S.curDate),pdk=dateKey(S.priorDate),isMom=S.view==='mom';

  const base=isMom?imPRows.reduce((s,r)=>s+r.value,0):imRows.reduce((s,r)=>s+r.prevYrAvg,0);
  const final=imRows.reduce((s,r)=>s+r.value,0);
  const baseLabel=isMom?(dateLabel(S.priorDate)||'Prior month'):'Annual avg';
  const stepMap={};
  imRows.forEach(r=>{const ex=r[S.exGran]||'Unknown';if(!stepMap[ex])stepMap[ex]={ex,mom:0,vsAvg:0};stepMap[ex].mom+=r.mom;stepMap[ex].vsAvg+=r.vsAvg;});
  const steps=Object.values(stepMap).map(d=>({ex:d.ex,val:Math.round(isMom?d.mom:d.vsAvg)})).sort((a,b)=>a.val-b.val);
  buildStatCards('w-stats',getRowsForDate(cdk).filter(r=>r[S.imGran]===S.activeImKey),getRowsForDate(pdk).filter(r=>r[S.imGran]===S.activeImKey));
  document.getElementById('w-note').textContent=`${S.imGran}=${S.activeImKey}. Base=${baseLabel}. Steps=each ${S.exGran} ${isMom?'m-o-m':'vs avg'}. Final=${dateLabel(S.curDate)}.`;

  const labels=[],floats=[],grays=[],posV=[],negV=[],posBg=[],negBg=[];
  labels.push(baseLabel);floats.push(0);grays.push(Math.round(base));posV.push(0);negV.push(0);posBg.push('rgba(0,0,0,0)');negBg.push('rgba(0,0,0,0)');
  let run=Math.round(base);
  steps.forEach(s=>{const col=rColor(s.ex)+'cc';labels.push(s.ex);floats.push(s.val>=0?run:run+s.val);grays.push(0);posV.push(s.val>=0?s.val:0);negV.push(s.val<0?Math.abs(s.val):0);posBg.push(s.val>=0?col:'rgba(0,0,0,0)');negBg.push(s.val<0?col:'rgba(0,0,0,0)');run+=s.val;});
  labels.push(dateLabel(S.curDate));floats.push(0);grays.push(Math.round(final));posV.push(0);negV.push(0);posBg.push('rgba(0,0,0,0)');negBg.push('rgba(0,0,0,0)');
  const allY=[Math.round(base),Math.round(final)];let r2=Math.round(base);steps.forEach(s=>{allY.push(r2);r2+=s.val;allY.push(r2);});
  const yMin=Math.min(...allY)*0.93,yMax=Math.max(...allY)*1.06;
  const datasets=[{label:'_float',data:floats,backgroundColor:'rgba(0,0,0,0)',borderColor:'rgba(0,0,0,0)',stack:'wf'},{label:'Base/Final',data:grays,backgroundColor:'#222',borderColor:'#222',stack:'wf',borderRadius:3},{label:'Growth',data:posV,backgroundColor:posBg,stack:'wf',borderRadius:3},{label:'Decline',data:negV,backgroundColor:negBg,stack:'wf',borderRadius:3}];
  const h=Math.max(400,(steps.length+2)*58+80);document.getElementById('w-chart-wrap').style.height=h+'px';
  const ctx=document.getElementById('wfChart').getContext('2d');
  if(wChart){wChart.data.labels=labels;wChart.data.datasets=datasets;wChart.options.scales.y.min=yMin;wChart.options.scales.y.max=yMax;wChart.update();return;}
  wChart=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:32}},plugins:{legend:{display:false},tooltip:{callbacks:{label(item){if(item.dataset.label==='_float')return null;if(item.dataset.label==='Base/Final')return ' total: '+Math.round(item.raw).toLocaleString()+' kb/d';const raw=item.dataset.label==='Decline'?-item.raw:item.raw;return ' '+(raw>0?'+':'')+Math.round(raw).toLocaleString()+' kb/d';},filter(item){return item.dataset.label!=='_float'&&item.raw!==0;}}}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#555',font:{size:11}},border:{display:false}},y:{stacked:true,min:yMin,max:yMax,grid:{color:'rgba(136,135,128,0.12)'},ticks:{color:'#888',font:{size:10},callback:v=>Math.round(v).toLocaleString()},border:{display:false}}}},plugins:[{id:'wf-lbl',afterDatasetsDraw(chart){const{ctx:c,scales:{x,y},data}=chart;c.save();c.font='500 11px sans-serif';c.textBaseline='bottom';c.textAlign='center';const pD=data.datasets[2].data,nD=data.datasets[3].data,fD=data.datasets[0].data,grD=data.datasets[1].data;data.labels.forEach((lbl,i)=>{const xp=x.getPixelForValue(i);if(grD[i]>0){c.fillStyle='#333';c.fillText(Math.round(grD[i]).toLocaleString(),xp,y.getPixelForValue(grD[i])-4);return;}if(pD[i]>0){c.fillStyle='#1a3a1a';c.fillText('+'+Math.round(pD[i]).toLocaleString(),xp,y.getPixelForValue(fD[i]+pD[i])-4);}if(nD[i]>0){c.fillStyle='#4a1a1a';c.fillText('-'+Math.round(nD[i]).toLocaleString(),xp,y.getPixelForValue(fD[i])-4);}});c.restore();}}]});

/* ── SANKEY ── */
function setSankeyEx(f){
  SK.exField=f;
  document.getElementById('s-ex-region').classList.toggle('active',f==='EX_REGION');
  document.getElementById('s-ex-tregion').classList.toggle('active',f==='EX_T_REGION');
  renderSankey();
}
function setSankeyIm(f){
  SK.imField=f;
  document.getElementById('s-im-region').classList.toggle('active',f==='IM_REGION');
  document.getElementById('s-im-tregion').classList.toggle('active',f==='IM_T_REGION');
  renderSankey();
}
document.getElementById('s-threshold').addEventListener('input',function(){
  SK.threshold=parseInt(this.value)||0;
  document.getElementById('s-threshold-lbl').textContent=SK.threshold.toLocaleString();
  renderSankey();
});

function renderSankey(){
  if(!S.rows.length)return;
  const wrap=document.getElementById('sankey-wrap');
  wrap.innerHTML='';
  const rows=getRowsForDate(dateKey(S.curDate));
  const flowMap={};
  rows.forEach(r=>{
    const ex=r[SK.exField]||'Unknown',im=r[SK.imField]||'Unknown',k=ex+'|||'+im;
    if(!flowMap[k])flowMap[k]={ex,im,value:0};
    flowMap[k].value+=r.value;
  });
  const flows=Object.values(flowMap).filter(f=>f.value>=SK.threshold);
  if(!flows.length){
    wrap.innerHTML=`<p style="color:#aaa;font-size:13px;padding:20px 0;">No flows above ${SK.threshold.toLocaleString()} kb/d. Try lowering the slider.</p>`;
    document.getElementById('s-stats').innerHTML='';
    return;
  }
  const totalFlow=flows.reduce((s,f)=>s+f.value,0);
  const allTotal=rows.reduce((s,r)=>s+r.value,0);
  document.getElementById('s-stats').innerHTML=`
    <div class="stat-card"><div class="lbl">${dateLabel(S.curDate)} total</div><div class="val">${fmtN(allTotal)}</div></div>
    <div class="stat-card"><div class="lbl">Shown (above threshold)</div><div class="val">${fmtN(totalFlow)}</div></div>
    <div class="stat-card"><div class="lbl">Coverage</div><div class="val">${allTotal>0?Math.round(totalFlow/allTotal*100)+'%':'—'}</div></div>
    <div class="stat-card"><div class="lbl">Corridors shown</div><div class="val">${flows.length}</div></div>`;
  document.getElementById('s-note').textContent=`Flows = VALUE_KBD for ${dateLabel(S.curDate)}. Corridors ≥ ${SK.threshold.toLocaleString()} kb/d shown. Coloured by export region.`;

  const exNodes=[...new Set(flows.map(f=>f.ex))].sort();
  const imNodes=[...new Set(flows.map(f=>f.im))].sort();
  const exTotals={},imTotals={};
  flows.forEach(f=>{exTotals[f.ex]=(exTotals[f.ex]||0)+f.value;imTotals[f.im]=(imTotals[f.im]||0)+f.value;});

  const W=Math.max(wrap.clientWidth||900,700);
  const nodeW=18,nodePad=12,lPad=150,rPad=150;
  const innerW=W-lPad-rPad-nodeW*2;
  const exX=lPad,imX=lPad+nodeW+innerW+nodeW;
  const maxTotal=Math.max(...Object.values(exTotals),...Object.values(imTotals));
  const availH=Math.max(exNodes.length,imNodes.length)*40;
  const scale=v=>(v/maxTotal)*availH*0.85;
  const H=availH+80;

  const exPos={},imPos={};
  let yc=40;
  exNodes.forEach(n=>{const h=Math.max(8,scale(exTotals[n]||0));exPos[n]={y:yc,h};yc+=h+nodePad;});
  yc=40;
  imNodes.forEach(n=>{const h=Math.max(8,scale(imTotals[n]||0));imPos[n]={y:yc,h};yc+=h+nodePad;});
  const totalH=Math.max(H,yc+40);

  flows.sort((a,b)=>b.value-a.value);
  const exOff={},imOff={};
  exNodes.forEach(n=>exOff[n]=0);imNodes.forEach(n=>imOff[n]=0);

  const svg=d3.select(wrap).append('svg')
    .attr('width','100%').attr('viewBox',`0 0 ${W} ${totalH}`)
    .attr('preserveAspectRatio','xMidYMid meet')
    .style('font-family','-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif');

  const cx=lPad+nodeW+(innerW/2);

  /* ribbons */
  flows.forEach(f=>{
    const ep=exPos[f.ex],ip=imPos[f.im];if(!ep||!ip)return;
    const fh=Math.max(1,scale(f.value));
    const ey0=ep.y+exOff[f.ex],iy0=ip.y+imOff[f.im];
    const x0=exX+nodeW,x1=imX;
    const path=`M${x0} ${ey0} C${cx} ${ey0},${cx} ${iy0},${x1} ${iy0} L${x1} ${iy0+fh} C${cx} ${iy0+fh},${cx} ${ey0+fh},${x0} ${ey0+fh} Z`;
    const col=rColor(f.ex);
    svg.append('path').attr('d',path).attr('fill',col).attr('fill-opacity',0.32).attr('stroke',col).attr('stroke-opacity',0.45).attr('stroke-width',0.5)
      .on('mouseover',function(event){
        d3.select(this).attr('fill-opacity',0.65).attr('stroke-opacity',0.9);
        const tip=document.getElementById('s-tooltip');
        tip.style.display='block';
        tip.innerHTML=`<div style="font-weight:500;margin-bottom:4px;">${f.ex} → ${f.im}</div><div style="color:#888;">${Math.round(f.value).toLocaleString()} kb/d</div>`;
        const wr=wrap.getBoundingClientRect();
        tip.style.left=(event.clientX-wr.left+12)+'px';
        tip.style.top=(event.clientY-wr.top-10)+'px';
      })
      .on('mouseout',function(){d3.select(this).attr('fill-opacity',0.32).attr('stroke-opacity',0.45);document.getElementById('s-tooltip').style.display='none';});
    exOff[f.ex]+=fh;imOff[f.im]+=fh;
  });

  /* ex nodes + labels */
  exNodes.forEach(n=>{
    const p=exPos[n],col=rColor(n);
    svg.append('rect').attr('x',exX).attr('y',p.y).attr('width',nodeW).attr('height',p.h).attr('fill',col).attr('rx',3);
    svg.append('text').attr('x',exX-8).attr('y',p.y+p.h/2-6).attr('text-anchor','end').attr('font-size',11).attr('fill','#444').attr('font-weight','500').text(n);
    svg.append('text').attr('x',exX-8).attr('y',p.y+p.h/2+8).attr('text-anchor','end').attr('font-size',10).attr('fill','#aaa').text(Math.round(exTotals[n]).toLocaleString()+' kb/d');
  });

  /* im nodes + labels */
  imNodes.forEach(n=>{
    const p=imPos[n],col=rColor(n);
    svg.append('rect').attr('x',imX).attr('y',p.y).attr('width',nodeW).attr('height',p.h).attr('fill',col).attr('rx',3);
    svg.append('text').attr('x',imX+nodeW+8).attr('y',p.y+p.h/2-6).attr('text-anchor','start').attr('font-size',11).attr('fill','#444').attr('font-weight','500').text(n);
    svg.append('text').attr('x',imX+nodeW+8).attr('y',p.y+p.h/2+8).attr('text-anchor','start').attr('font-size',10).attr('fill','#aaa').text(Math.round(imTotals[n]).toLocaleString()+' kb/d');
  });

  /* column headers */
  svg.append('text').attr('x',exX+nodeW/2).attr('y',22).attr('text-anchor','middle').attr('font-size',12).attr('font-weight','500').attr('fill','#666').text(SK.exField==='EX_REGION'?'IEA Export Region':'Export Trade Region');
  svg.append('text').attr('x',imX+nodeW/2).attr('y',22).attr('text-anchor','middle').attr('font-size',12).attr('font-weight','500').attr('fill','#666').text(SK.imField==='IM_REGION'?'IEA Import Region':'Import Trade Region');
}

/* ── TAB SWITCH ── */
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');document.getElementById('panel-'+name).classList.add('active');
  if(name==='sankey')renderSankey();
}

/* ── AUTO-FETCH ── */
(function(){
  const URL='https://raw.githubusercontent.com/jennythomson-123/crude-flow-dashboard/main/data.xlsx';
  setStatus('Loading data…','');
  fetch(URL).then(r=>{if(!r.ok)throw new Error('not found');return r.arrayBuffer();}).then(buf=>processRawData(buf,'data.xlsx')).catch(()=>setStatus('Upload your Excel file to begin',''));
})();
</script>
